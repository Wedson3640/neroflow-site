# ============================================================
# nginx.conf — Neroflow
# Estrutura:
#   neroflow.com.br        → Landing page estática
#   app.neroflow.com.br    → Next.js (porta 3001)
#   api.neroflow.com.br    → FastAPI  (porta 8000)
# SSL gerenciado por Certbot (Let's Encrypt)
# ============================================================

# ── neroflow.com.br — Landing estática ───────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name neroflow.com.br www.neroflow.com.br;
    return 301 https://neroflow.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name neroflow.com.br www.neroflow.com.br;

    ssl_certificate     /etc/letsencrypt/live/neroflow.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neroflow.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/landing;
    index index.html;

    # Compressão
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache de assets estáticos
    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redireciona www → sem www
    if ($host = www.neroflow.com.br) {
        return 301 https://neroflow.com.br$request_uri;
    }
}

# ── app.neroflow.com.br — Next.js ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.neroflow.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.neroflow.com.br;

    ssl_certificate     /etc/letsencrypt/live/app.neroflow.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.neroflow.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/html text/css application/javascript;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache de assets gerados pelo Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── api.neroflow.com.br — FastAPI ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.neroflow.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.neroflow.com.br;

    ssl_certificate     /etc/letsencrypt/live/api.neroflow.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.neroflow.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Limite de upload para certificados A1 (.pfx)
    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
